<!DOCTYPE html>
<html>
<head>
    <title>Attendance Report Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 420px;
        }
        h2 { margin-bottom: 8px; color: #1A5276; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
        input[type="file"] { margin-bottom: 12px; }
        button {
            color: white;
            padding: 11px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 0.95rem;
            font-weight: bold;
        }
        .btn-blue   { background-color: #305496; }
        .btn-blue:hover   { background-color: #1f3a73; }
        .btn-green  { background-color: #0E6655; }
        .btn-green:hover  { background-color: #0a4f42; }
        .btn-gold   { background-color: #B8860B; }
        .btn-gold:hover   { background-color: #9a7009; }
        .btn-teal   { background-color: #1A5276; }
        .btn-teal:hover   { background-color: #154360; }
        .btn-red    { background-color: #922B21; }
        .btn-red:hover    { background-color: #7B241C; }
        a { text-decoration: none; }
        .divider { border: none; border-top: 1px solid #e0e0e0; margin: 20px 0; }
        .section-label {
            font-size: 0.78rem;
            font-weight: bold;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🏢 Attendance System</h2>
    <p class="subtitle">Mignited Technologies and Solutions</p>

    <div class="section-label">📁 Manual Upload</div>
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".dat" required>
        <button type="submit" class="btn-blue">📊 Generate Excel Report</button>
    </form>

    <hr class="divider">

    <div class="section-label">📡 Live Biometric</div>
    <form action="/pull-device" method="POST">
        <button type="submit" class="btn-green">📥 Pull Data from Device</button>
    </form>
    <a href="/live">
        <button class="btn-teal">📡 Live Attendance Feed</button>
    </a>

    <hr class="divider">

    <div class="section-label">⚙️ Settings</div>
    <a href="/device-settings">
        <button class="btn-gold">🔧 Device Settings</button>
    </a>
    <a href="/employees">
        <button class="btn-red">👥 Manage Employees</button>
    </a>
</div>
</body>
</html>
