<!DOCTYPE html>
<html>
<head>
    <title>Attendance Report Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h2 { margin-bottom: 20px; }
        input[type="file"] { margin-bottom: 20px; }
        button {
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 0.95rem;
        }
        .btn-blue  { background-color: #305496; }
        .btn-blue:hover  { background-color: #1f3a73; }
        .btn-green { background-color: #0E6655; }
        .btn-green:hover { background-color: #0a4f42; }
        .btn-gold  { background-color: #B8860B; }
        .btn-gold:hover  { background-color: #9a7009; }
        a { text-decoration: none; }
        .divider { border: none; border-top: 1px solid #e0e0e0; margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>Attendance Report Generator</h2>
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit" class="btn-blue">📊 Generate Excel Report</button>
    </form>
    <hr class="divider">
    <a href="/live">
        <button class="btn-green">📡 Live Biometric Feed</button>
    </a>
    <a href="/employees">
        <button class="btn-gold">⚙️ Manage Employees</button>
    </a>
</div>
</body>
</html>
